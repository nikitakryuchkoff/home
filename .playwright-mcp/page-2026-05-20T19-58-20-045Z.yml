              - generic [ref=e95]: "01"
              - generic [ref=e96]:
                - heading "Сколько стоит DMX система управления" [level=3] [ref=e97]
                - paragraph [ref=e98]: DMX-управление — это инженерия, а не коробка.
                - generic [ref=e99]:
                  - paragraph [ref=e100]: "DMX-система управления — это шкаф, контроллеры, разводка, вселенные, синхронизация плоскостей и логика сценариев. Готового прайса нет: каждое здание считается отдельно."
                  - paragraph [ref=e101]: "Для премиальных объектов мы фиксируем стартовый порог: объединение нескольких фасадов в единый сценарий — от 4 000 USD. Сами сцены считаются отдельно по тарифной сетке ниже."
            - article [ref=e102]:
              - generic [ref=e103]: "02"
              - generic [ref=e104]:
                - heading "Стоимость фасадной анимации" [level=3] [ref=e105]
                - paragraph [ref=e106]: Сцена — атомарная единица расчёта.
                - generic [ref=e107]:
                  - paragraph [ref=e108]: Мы считаем фасадную анимацию по сценам, а не по метражу. Это позволяет точно отделять простую динамику от сложной авторской работы и не платить за объём, которого нет.
                  - paragraph [ref=e109]: Для окон и фасадной светодинамики тарифы выше — там больше каналов и тоньше ручная работа. Для пиксельных ламелей сцены дешевле за счёт стандартизованной адресации.
            - article [ref=e110]:
              - generic [ref=e111]: "03"
              - generic [ref=e112]:
                - heading "Цена пиксельного фасада" [level=3] [ref=e113]
                - paragraph [ref=e114]: Сетка, шаг, среда, контроллер.
                - generic [ref=e115]:
                  - paragraph [ref=e116]: Цена пиксельного фасада складывается из количества точек, шага сетки, IP-класса, типа крепления и контроллера. Точные цифры мы даём только после изучения геометрии и условий монтажа.
                  - paragraph [ref=e117]: "Сцены для пиксельного фасада считаются по тарифу ниже: простая — 200 USD, средняя — 600 USD, сложная — 1 600 USD. Это позволяет точно планировать бюджет на контент."
            - article [ref=e118]:
              - generic [ref=e119]: "04"
              - generic [ref=e120]:
                - heading "Почему сложная анимация стоит дороже" [level=3] [ref=e121]
                - paragraph [ref=e122]: Сложная сцена — это две недели ручной работы.
                - paragraph [ref=e124]: Сложная сцена пишется индивидуально под фасад. Это ручная работа с большим количеством элементов, многослойные переходы, ночные тесты и точная калибровка ритма анимации к геометрии.
            - article [ref=e125]:
              - generic [ref=e126]: "05"
              - generic [ref=e127]:
                - heading "Почему объединение фасадов считается отдельно" [level=3] [ref=e128]
                - paragraph [ref=e129]: Здание читается как одно целое.
                - paragraph [ref=e131]: Когда у объекта 2+ фасада, мы синхронизируем плоскости в единую драматургию. Это переходы между сторонами, согласование фаз, тестирование с нескольких ракурсов и удалённый монтажный контроль.
