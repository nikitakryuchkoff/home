            - heading "Частые вопросы." [level=2] [ref=e222]
          - list [ref=e223]:
            - listitem [ref=e224]:
              - heading "[ 01 ] Сколько стоит DMX система управления?" [level=3] [ref=e225]:
                - button "[ 01 ] Сколько стоит DMX система управления?" [expanded] [ref=e226] [cursor=pointer]:
                  - generic [ref=e227]: "[ 01 ]"
                  - generic [ref=e228]: Сколько стоит DMX система управления?
                  - generic [ref=e229]: −
              - region [ref=e230]:
                - paragraph [ref=e232]: Стоимость DMX-системы складывается из топологии шкафов, контроллеров, количества вселенных, синхронизации плоскостей и сложности сценариев. Для премиальных объектов она формируется индивидуально и обычно начинается от 4 000 USD за объединение нескольких фасадов в единый сценарий. Сценарии под ключ считаются отдельно — простая сцена от 600 USD, сложная — до 3 000 USD за сцену.
            - listitem [ref=e234]:
              - heading "[ 02 ] Сколько стоит фасадная анимация?" [level=3] [ref=e235]:
                - button "[ 02 ] Сколько стоит фасадная анимация?" [ref=e236] [cursor=pointer]:
                  - generic [ref=e237]: "[ 02 ]"
                  - generic [ref=e238]: Сколько стоит фасадная анимация?
                  - generic [ref=e239]: +
              - paragraph [ref=e241]: "Фасадная анимация считается по сценам. Простая сцена — 600 USD, средняя — 1 000 USD, сложная — 3 000 USD. На пиксельных и ламельных фасадах сцены дешевле: 200 / 600 / 1 600 USD. Объединение нескольких фасадов в единый сценарий — отдельная позиция, от 4 000 USD."
            - listitem [ref=e243]:
              - heading "[ 03 ] Сколько стоит 1 пиксель медиафасада?" [level=3] [ref=e244]:
                - button "[ 03 ] Сколько стоит 1 пиксель медиафасада?" [ref=e245] [cursor=pointer]:
                  - generic [ref=e246]: "[ 03 ]"
                  - generic [ref=e247]: Сколько стоит 1 пиксель медиафасада?
                  - generic [ref=e248]: +
              - paragraph [ref=e250]: Стоимость одного пикселя зависит от шага сетки, типа крепления, защиты от внешней среды и контроллера. Цена варьируется от нескольких долларов за пиксель в плотных уличных матрицах до десятков долларов в крупном уличном пикселе с независимой адресацией. Точную цифру мы даём после изучения геометрии фасада.
            - listitem [ref=e252]:
              - heading "[ 04 ] Сколько стоит 1 точка пиксельного фасада?" [level=3] [ref=e253]:
                - button "[ 04 ] Сколько стоит 1 точка пиксельного фасада?" [ref=e254] [cursor=pointer]:
                  - generic [ref=e255]: "[ 04 ]"
                  - generic [ref=e256]: Сколько стоит 1 точка пиксельного фасада?
                  - generic [ref=e257]: +
              - paragraph [ref=e259]: Точка ламельного и пиксельного фасада обычно стоит дешевле классического медиапикселя за счёт большего шага и упрощённой адресации. Реальная цена считается под задачу, мы выдаём её в коммерческом предложении вместе со схемой раскладки.
            - listitem [ref=e261]:
              - heading "[ 05 ] Сколько стоит 1 метр гибкого неона?" [level=3] [ref=e262]:
                - button "[ 05 ] Сколько стоит 1 метр гибкого неона?" [ref=e263] [cursor=pointer]:
                  - generic [ref=e264]: "[ 05 ]"
                  - generic [ref=e265]: Сколько стоит 1 метр гибкого неона?
                  - generic [ref=e266]: +
              - paragraph [ref=e268]: "Стоимость метра неона зависит от типа: моно RGB, RGBW, IP-класса, толщины и крепежа. Базовый монохромный неон стоит существенно дешевле, чем полноцветный с пиксельным управлением. Финальная цена — после раскладки контура."
            - listitem [ref=e270]:
              - heading "[ 06 ] Чем отличается простая, средняя и сложная анимация?" [level=3] [ref=e271]:
                - button "[ 06 ] Чем отличается простая, средняя и сложная анимация?" [ref=e272] [cursor=pointer]:
                  - generic [ref=e273]: "[ 06 ]"
                  - generic [ref=e274]: Чем отличается простая, средняя и сложная анимация?
                  - generic [ref=e275]: +
              - paragraph [ref=e277]: Простая сцена — базовая волна, спокойный архитектурный акцент, минимальная ручная доработка. Средняя — зонирование, диммирование частей, несколько фаз, работа с геометрией. Сложная — индивидуальная логика, ручная работа по большому количеству элементов, длительная настройка, до двух недель на сцену.
            - listitem [ref=e279]:
              - heading "[ 07 ] Почему сложная анимация стоит дороже?" [level=3] [ref=e280]:
                - button "[ 07 ] Почему сложная анимация стоит дороже?" [ref=e281] [cursor=pointer]:
                  - generic [ref=e282]: "[ 07 ]"
                  - generic [ref=e283]: Почему сложная анимация стоит дороже?
                  - generic [ref=e284]: +
              - paragraph [ref=e286]: "Сложная сцена пишется вручную для конкретного фасада: ритм геометрии, индивидуальные группы, многослойные переходы, ночные тесты и точная калибровка. На один такой сценарий уходит до двух недель работы инженера и художника по свету."
            - listitem [ref=e288]:
              - heading "[ 08 ] Что входит в стоимость?" [level=3] [ref=e289]:
                - button "[ 08 ] Что входит в стоимость?" [ref=e290] [cursor=pointer]:
                  - generic [ref=e291]: "[ 08 ]"
                  - generic [ref=e292]: Что входит в стоимость?
                  - generic [ref=e293]: +
              - paragraph [ref=e295]: В стоимость сцены входит написание сценария, настройка на оборудовании заказчика или нашей лабе, синхронизация фаз, ночное тестирование на объекте, документация по сцене и передача исходников. Оборудование и монтаж считаются отдельно.
            - listitem [ref=e297]:
              - heading "[ 09 ] Почему объединение фасадов считается отдельно?" [level=3] [ref=e298]:
                - button "[ 09 ] Почему объединение фасадов считается отдельно?" [ref=e299] [cursor=pointer]:
                  - generic [ref=e300]: "[ 09 ]"
                  - generic [ref=e301]: Почему объединение фасадов считается отдельно?
                  - generic [ref=e302]: +
              - paragraph [ref=e304]: "Когда здание имеет 2+ фасада, появляется единая драматургия: переходы между плоскостями, согласование общей логики, тестирование сценариев на разных углах и удалённый монтажный надзор. Это отдельная инженерная работа, не сводимая к сумме сцен."
            - listitem [ref=e306]:
              - heading "[ 10 ] Сколько стоит обслуживание архитектурного освещения?" [level=3] [ref=e307]:
                - button "[ 10 ] Сколько стоит обслуживание архитектурного освещения?" [ref=e308] [cursor=pointer]:
                  - generic [ref=e309]: "[ 10 ]"
                  - generic [ref=e310]: Сколько стоит обслуживание архитектурного освещения?
                  - generic [ref=e311]: +
              - paragraph [ref=e313]: "Стоимость сервиса формируется как годовой контракт: количество регламентных выездов, время реакции по SLA, удалённый мониторинг и склад запасных модулей. Для отелей и landmark-фасадов мы предлагаем расширенный SLA с реакцией от 4 часов."
