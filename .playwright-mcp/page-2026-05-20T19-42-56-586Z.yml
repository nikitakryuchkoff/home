          - heading "Частые вопросы." [level=2] [ref=e224]
        - list [ref=e225]:
          - listitem [ref=e226]:
            - heading "[ 01 ] Сколько стоит DMX система управления?" [level=3] [ref=e227]:
              - button "[ 01 ] Сколько стоит DMX система управления?" [expanded] [ref=e228] [cursor=pointer]:
                - generic [ref=e229]: "[ 01 ]"
                - generic [ref=e230]: Сколько стоит DMX система управления?
                - generic [ref=e231]: −
            - region [ref=e232]:
              - paragraph [ref=e234]: Стоимость DMX-системы складывается из топологии шкафов, контроллеров, количества вселенных, синхронизации плоскостей и сложности сценариев. Для премиальных объектов она формируется индивидуально и обычно начинается от 4 000 USD за объединение нескольких фасадов в единый сценарий. Сценарии под ключ считаются отдельно — простая сцена от 600 USD, сложная — до 3 000 USD за сцену.
          - listitem [ref=e236]:
            - heading "[ 02 ] Сколько стоит фасадная анимация?" [level=3] [ref=e237]:
              - button "[ 02 ] Сколько стоит фасадная анимация?" [ref=e238] [cursor=pointer]:
                - generic [ref=e239]: "[ 02 ]"
                - generic [ref=e240]: Сколько стоит фасадная анимация?
                - generic [ref=e241]: +
            - paragraph [ref=e243]: "Фасадная анимация считается по сценам. Простая сцена — 600 USD, средняя — 1 000 USD, сложная — 3 000 USD. На пиксельных и ламельных фасадах сцены дешевле: 200 / 600 / 1 600 USD. Объединение нескольких фасадов в единый сценарий — отдельная позиция, от 4 000 USD."
          - listitem [ref=e245]:
            - heading "[ 03 ] Сколько стоит 1 пиксель медиафасада?" [level=3] [ref=e246]:
              - button "[ 03 ] Сколько стоит 1 пиксель медиафасада?" [ref=e247] [cursor=pointer]:
                - generic [ref=e248]: "[ 03 ]"
                - generic [ref=e249]: Сколько стоит 1 пиксель медиафасада?
                - generic [ref=e250]: +
            - paragraph [ref=e252]: Стоимость одного пикселя зависит от шага сетки, типа крепления, защиты от внешней среды и контроллера. Цена варьируется от нескольких долларов за пиксель в плотных уличных матрицах до десятков долларов в крупном уличном пикселе с независимой адресацией. Точную цифру мы даём после изучения геометрии фасада.
          - listitem [ref=e254]:
            - heading "[ 04 ] Сколько стоит 1 точка пиксельного фасада?" [level=3] [ref=e255]:
              - button "[ 04 ] Сколько стоит 1 точка пиксельного фасада?" [ref=e256] [cursor=pointer]:
                - generic [ref=e257]: "[ 04 ]"
                - generic [ref=e258]: Сколько стоит 1 точка пиксельного фасада?
                - generic [ref=e259]: +
            - paragraph [ref=e261]: Точка ламельного и пиксельного фасада обычно стоит дешевле классического медиапикселя за счёт большего шага и упрощённой адресации. Реальная цена считается под задачу, мы выдаём её в коммерческом предложении вместе со схемой раскладки.
          - listitem [ref=e263]:
            - heading "[ 05 ] Сколько стоит 1 метр гибкого неона?" [level=3] [ref=e264]:
              - button "[ 05 ] Сколько стоит 1 метр гибкого неона?" [ref=e265] [cursor=pointer]:
                - generic [ref=e266]: "[ 05 ]"
                - generic [ref=e267]: Сколько стоит 1 метр гибкого неона?
                - generic [ref=e268]: +
            - paragraph [ref=e270]: "Стоимость метра неона зависит от типа: моно RGB, RGBW, IP-класса, толщины и крепежа. Базовый монохромный неон стоит существенно дешевле, чем полноцветный с пиксельным управлением. Финальная цена — после раскладки контура."
          - listitem [ref=e272]:
            - heading "[ 06 ] Чем отличается простая, средняя и сложная анимация?" [level=3] [ref=e273]:
              - button "[ 06 ] Чем отличается простая, средняя и сложная анимация?" [ref=e274] [cursor=pointer]:
                - generic [ref=e275]: "[ 06 ]"
                - generic [ref=e276]: Чем отличается простая, средняя и сложная анимация?
                - generic [ref=e277]: +
            - paragraph [ref=e279]: Простая сцена — базовая волна, спокойный архитектурный акцент, минимальная ручная доработка. Средняя — зонирование, диммирование частей, несколько фаз, работа с геометрией. Сложная — индивидуальная логика, ручная работа по большому количеству элементов, длительная настройка, до двух недель на сцену.
          - listitem [ref=e281]:
            - heading "[ 07 ] Почему сложная анимация стоит дороже?" [level=3] [ref=e282]:
              - button "[ 07 ] Почему сложная анимация стоит дороже?" [ref=e283] [cursor=pointer]:
                - generic [ref=e284]: "[ 07 ]"
                - generic [ref=e285]: Почему сложная анимация стоит дороже?
                - generic [ref=e286]: +
            - paragraph [ref=e288]: "Сложная сцена пишется вручную для конкретного фасада: ритм геометрии, индивидуальные группы, многослойные переходы, ночные тесты и точная калибровка. На один такой сценарий уходит до двух недель работы инженера и художника по свету."
          - listitem [ref=e290]:
            - heading "[ 08 ] Что входит в стоимость?" [level=3] [ref=e291]:
              - button "[ 08 ] Что входит в стоимость?" [ref=e292] [cursor=pointer]:
                - generic [ref=e293]: "[ 08 ]"
                - generic [ref=e294]: Что входит в стоимость?
                - generic [ref=e295]: +
            - paragraph [ref=e297]: В стоимость сцены входит написание сценария, настройка на оборудовании заказчика или нашей лабе, синхронизация фаз, ночное тестирование на объекте, документация по сцене и передача исходников. Оборудование и монтаж считаются отдельно.
          - listitem [ref=e299]:
            - heading "[ 09 ] Почему объединение фасадов считается отдельно?" [level=3] [ref=e300]:
              - button "[ 09 ] Почему объединение фасадов считается отдельно?" [ref=e301] [cursor=pointer]:
                - generic [ref=e302]: "[ 09 ]"
                - generic [ref=e303]: Почему объединение фасадов считается отдельно?
                - generic [ref=e304]: +
            - paragraph [ref=e306]: "Когда здание имеет 2+ фасада, появляется единая драматургия: переходы между плоскостями, согласование общей логики, тестирование сценариев на разных углах и удалённый монтажный надзор. Это отдельная инженерная работа, не сводимая к сумме сцен."
          - listitem [ref=e308]:
            - heading "[ 10 ] Сколько стоит обслуживание архитектурного освещения?" [level=3] [ref=e309]:
              - button "[ 10 ] Сколько стоит обслуживание архитектурного освещения?" [ref=e310] [cursor=pointer]:
                - generic [ref=e311]: "[ 10 ]"
                - generic [ref=e312]: Сколько стоит обслуживание архитектурного освещения?
                - generic [ref=e313]: +
            - paragraph [ref=e315]: "Стоимость сервиса формируется как годовой контракт: количество регламентных выездов, время реакции по SLA, удалённый мониторинг и склад запасных модулей. Для отелей и landmark-фасадов мы предлагаем расширенный SLA с реакцией от 4 часов."
