            - paragraph [ref=e105]: Прямые экспертные ответы — те же, что мы отправляем в коммерческих предложениях.
        - generic [ref=e106]:
          - article [ref=e107]:
            - generic [ref=e108]: "01"
            - generic [ref=e109]:
              - heading "Сколько стоит DMX система управления" [level=3] [ref=e110]
              - paragraph [ref=e111]: DMX-управление — это инженерия, а не коробка.
              - generic [ref=e112]:
                - paragraph [ref=e113]: "DMX-система управления — это шкаф, контроллеры, разводка, вселенные, синхронизация плоскостей и логика сценариев. Готового прайса нет: каждое здание считается отдельно."
                - paragraph [ref=e114]: "Для премиальных объектов мы фиксируем стартовый порог: объединение нескольких фасадов в единый сценарий — от 4 000 USD. Сами сцены считаются отдельно по тарифной сетке ниже."
          - article [ref=e115]:
            - generic [ref=e116]: "02"
            - generic [ref=e117]:
              - heading "Стоимость фасадной анимации" [level=3] [ref=e118]
              - paragraph [ref=e119]: Сцена — атомарная единица расчёта.
              - generic [ref=e120]:
                - paragraph [ref=e121]: Мы считаем фасадную анимацию по сценам, а не по метражу. Это позволяет точно отделять простую динамику от сложной авторской работы и не платить за объём, которого нет.
                - paragraph [ref=e122]: Для окон и фасадной светодинамики тарифы выше — там больше каналов и тоньше ручная работа. Для пиксельных ламелей сцены дешевле за счёт стандартизованной адресации.
          - article [ref=e123]:
            - generic [ref=e124]: "03"
            - generic [ref=e125]:
              - heading "Цена пиксельного фасада" [level=3] [ref=e126]
              - paragraph [ref=e127]: Сетка, шаг, среда, контроллер.
              - generic [ref=e128]:
                - paragraph [ref=e129]: Цена пиксельного фасада складывается из количества точек, шага сетки, IP-класса, типа крепления и контроллера. Точные цифры мы даём только после изучения геометрии и условий монтажа.
                - paragraph [ref=e130]: "Сцены для пиксельного фасада считаются по тарифу ниже: простая — 200 USD, средняя — 600 USD, сложная — 1 600 USD. Это позволяет точно планировать бюджет на контент."
          - article [ref=e131]:
            - generic [ref=e132]: "04"
            - generic [ref=e133]:
              - heading "Почему сложная анимация стоит дороже" [level=3] [ref=e134]
              - paragraph [ref=e135]: Сложная сцена — это две недели ручной работы.
              - paragraph [ref=e137]: Сложная сцена пишется индивидуально под фасад. Это ручная работа с большим количеством элементов, многослойные переходы, ночные тесты и точная калибровка ритма анимации к геометрии.
          - article [ref=e138]:
            - generic [ref=e139]: "05"
            - generic [ref=e140]:
              - heading "Почему объединение фасадов считается отдельно" [level=3] [ref=e141]
              - paragraph [ref=e142]: Здание читается как одно целое.
              - paragraph [ref=e144]: Когда у объекта 2+ фасада, мы синхронизируем плоскости в единую драматургию. Это переходы между сторонами, согласование фаз, тестирование с нескольких ракурсов и удалённый монтажный контроль.
