            - heading "Frequently asked." [level=2] [ref=e419]
          - list [ref=e224]:
            - listitem [ref=e225]:
              - heading "[ 01 ] How much does a DMX control system cost?" [level=3] [ref=e420]:
                - button "[ 01 ] How much does a DMX control system cost?" [ref=e421] [cursor=pointer]:
                  - generic [ref=e228]: "[ 01 ]"
                  - generic [ref=e229]: How much does a DMX control system cost?
                  - generic [ref=e230]: +
              - paragraph [ref=e233]: A DMX system price depends on cabinet topology, controllers, number of universes, plane synchronisation and scene complexity. For premium projects pricing is individual and starts from 4 000 USD for unified facade orchestration. Turn-key scenes are quoted separately — basic from 600 USD, complex up to 3 000 USD per scene.
            - listitem [ref=e235]:
              - heading "[ 02 ] How much does a facade animation cost?" [level=3] [ref=e422]:
                - button "[ 02 ] How much does a facade animation cost?" [expanded] [ref=e423] [cursor=pointer]:
                  - generic [ref=e238]: "[ 02 ]"
                  - generic [ref=e239]: How much does a facade animation cost?
                  - generic [ref=e240]: −
              - region [ref=e388]:
                - paragraph [ref=e242]: "Facade animation is quoted by scene. Basic — 600 USD, medium — 1 000 USD, complex — 3 000 USD. On pixel and lamellae facades scenes are lower: 200 / 600 / 1 600 USD. Multi-facade orchestration is a separate item, from 4 000 USD."
            - listitem [ref=e244]:
              - heading "[ 03 ] How much does one media-facade pixel cost?" [level=3] [ref=e424]:
                - button "[ 03 ] How much does one media-facade pixel cost?" [ref=e425] [cursor=pointer]:
                  - generic [ref=e247]: "[ 03 ]"
                  - generic [ref=e248]: How much does one media-facade pixel cost?
                  - generic [ref=e249]: +
              - paragraph [ref=e251]: The price of one pixel depends on pitch, mounting type, environmental rating and the controller. It varies from a few USD per pixel in dense outdoor matrices to tens of USD in large independently addressed nodes. We give the exact figure after reviewing facade geometry.
            - listitem [ref=e253]:
              - heading "[ 04 ] How much does one pixel-facade point cost?" [level=3] [ref=e426]:
                - button "[ 04 ] How much does one pixel-facade point cost?" [ref=e427] [cursor=pointer]:
                  - generic [ref=e256]: "[ 04 ]"
                  - generic [ref=e257]: How much does one pixel-facade point cost?
                  - generic [ref=e258]: +
              - paragraph [ref=e260]: A lamellae or pixel-facade point is usually cheaper than a classic media pixel due to larger pitch and simpler addressing. The real price is calculated for the task and supplied with a layout in the proposal.
            - listitem [ref=e262]:
              - heading "[ 05 ] How much does one metre of flexible neon cost?" [level=3] [ref=e428]:
                - button "[ 05 ] How much does one metre of flexible neon cost?" [ref=e429] [cursor=pointer]:
                  - generic [ref=e265]: "[ 05 ]"
                  - generic [ref=e266]: How much does one metre of flexible neon cost?
                  - generic [ref=e267]: +
              - paragraph [ref=e269]: "The metre price of neon depends on the type: mono, RGB, RGBW, IP rating, thickness and mounts. Basic monochrome neon is significantly cheaper than full-colour pixel-controlled neon. The final price follows the contour layout."
            - listitem [ref=e271]:
              - heading "[ 06 ] What is the difference between basic, medium and complex animation?" [level=3] [ref=e430]:
                - button "[ 06 ] What is the difference between basic, medium and complex animation?" [ref=e431] [cursor=pointer]:
                  - generic [ref=e274]: "[ 06 ]"
                  - generic [ref=e275]: What is the difference between basic, medium and complex animation?
                  - generic [ref=e276]: +
              - paragraph [ref=e278]: Basic — a base wave, quiet architectural accent, minimal manual work. Medium — zoning, partial dimming, several phases, geometry-aware. Complex — individual logic, large-volume hand-tuned work, lengthy setup, up to two weeks per scene.
            - listitem [ref=e280]:
              - heading "[ 07 ] Why does complex animation cost more?" [level=3] [ref=e432]:
                - button "[ 07 ] Why does complex animation cost more?" [ref=e433] [cursor=pointer]:
                  - generic [ref=e283]: "[ 07 ]"
                  - generic [ref=e284]: Why does complex animation cost more?
                  - generic [ref=e285]: +
              - paragraph [ref=e287]: "A complex scene is hand-authored for a specific facade: geometry rhythm, custom groups, multi-layered transitions, night tests and precise calibration. One such scene takes up to two weeks of an engineer and a lighting designer."
            - listitem [ref=e289]:
              - heading "[ 08 ] What is included in the price?" [level=3] [ref=e434]:
                - button "[ 08 ] What is included in the price?" [ref=e435] [cursor=pointer]:
                  - generic [ref=e292]: "[ 08 ]"
                  - generic [ref=e293]: What is included in the price?
                  - generic [ref=e294]: +
              - paragraph [ref=e296]: The scene price includes scenario authoring, setup on the client’s or our lab equipment, phase synchronisation, on-site night testing, documentation and source handover. Hardware and installation are quoted separately.
            - listitem [ref=e298]:
              - heading "[ 09 ] Why is multi-facade orchestration priced separately?" [level=3] [ref=e436]:
                - button "[ 09 ] Why is multi-facade orchestration priced separately?" [ref=e437] [cursor=pointer]:
                  - generic [ref=e301]: "[ 09 ]"
                  - generic [ref=e302]: Why is multi-facade orchestration priced separately?
                  - generic [ref=e303]: +
              - paragraph [ref=e305]: "When a building has 2+ facades, a unified dramaturgy appears: transitions between planes, common logic alignment, scene testing across angles and remote installation supervision. This is separate engineering work, not a sum of scenes."
            - listitem [ref=e307]:
              - heading "[ 10 ] How much does architectural lighting maintenance cost?" [level=3] [ref=e438]:
                - button "[ 10 ] How much does architectural lighting maintenance cost?" [ref=e439] [cursor=pointer]:
                  - generic [ref=e310]: "[ 10 ]"
                  - generic [ref=e311]: How much does architectural lighting maintenance cost?
                  - generic [ref=e312]: +
              - paragraph [ref=e314]: "Maintenance is a yearly contract: number of scheduled visits, SLA response time, remote monitoring and a spare-module pool. For hotels and landmarks we offer an extended SLA with response from 4 hours."
