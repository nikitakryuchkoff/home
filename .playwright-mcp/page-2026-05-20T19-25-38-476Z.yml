        - generic [ref=e105]:
          - article [ref=e106]:
            - generic [ref=e107]: "01"
            - generic [ref=e108]:
              - heading "Сколько стоит DMX система управления" [level=3] [ref=e109]
              - paragraph [ref=e110]: DMX-управление — это инженерия, а не коробка.
              - generic [ref=e111]:
                - paragraph [ref=e112]: "DMX-система управления — это шкаф, контроллеры, разводка, вселенные, синхронизация плоскостей и логика сценариев. Готового прайса нет: каждое здание считается отдельно."
                - paragraph [ref=e113]: "Для премиальных объектов мы фиксируем стартовый порог: объединение нескольких фасадов в единый сценарий — от 4 000 USD. Сами сцены считаются отдельно по тарифной сетке ниже."
          - article [ref=e114]:
            - generic [ref=e115]: "02"
            - generic [ref=e116]:
              - heading "Стоимость фасадной анимации" [level=3] [ref=e117]
              - paragraph [ref=e118]: Сцена — атомарная единица расчёта.
              - generic [ref=e119]:
                - paragraph [ref=e120]: Мы считаем фасадную анимацию по сценам, а не по метражу. Это позволяет точно отделять простую динамику от сложной авторской работы и не платить за объём, которого нет.
                - paragraph [ref=e121]: Для окон и фасадной светодинамики тарифы выше — там больше каналов и тоньше ручная работа. Для пиксельных ламелей сцены дешевле за счёт стандартизованной адресации.
          - article [ref=e122]:
            - generic [ref=e123]: "03"
            - generic [ref=e124]:
              - heading "Цена пиксельного фасада" [level=3] [ref=e125]
              - paragraph [ref=e126]: Сетка, шаг, среда, контроллер.
              - generic [ref=e127]:
                - paragraph [ref=e128]: Цена пиксельного фасада складывается из количества точек, шага сетки, IP-класса, типа крепления и контроллера. Точные цифры мы даём только после изучения геометрии и условий монтажа.
                - paragraph [ref=e129]: "Сцены для пиксельного фасада считаются по тарифу ниже: простая — 200 USD, средняя — 600 USD, сложная — 1 600 USD. Это позволяет точно планировать бюджет на контент."
          - article [ref=e130]:
            - generic [ref=e131]: "04"
            - generic [ref=e132]:
              - heading "Почему сложная анимация стоит дороже" [level=3] [ref=e133]
              - paragraph [ref=e134]: Сложная сцена — это две недели ручной работы.
              - paragraph [ref=e136]: Сложная сцена пишется индивидуально под фасад. Это ручная работа с большим количеством элементов, многослойные переходы, ночные тесты и точная калибровка ритма анимации к геометрии.
          - article [ref=e137]:
            - generic [ref=e138]: "05"
            - generic [ref=e139]:
              - heading "Почему объединение фасадов считается отдельно" [level=3] [ref=e140]
              - paragraph [ref=e141]: Здание читается как одно целое.
              - paragraph [ref=e143]: Когда у объекта 2+ фасада, мы синхронизируем плоскости в единую драматургию. Это переходы между сторонами, согласование фаз, тестирование с нескольких ракурсов и удалённый монтажный контроль.
