          - heading "Частые вопросы." [level=2] [ref=e223]
        - list [ref=e224]:
          - listitem [ref=e225]:
            - heading "[ 01 ] Сколько стоит DMX система управления?" [level=3] [ref=e226]:
              - button "[ 01 ] Сколько стоит DMX система управления?" [expanded] [ref=e227] [cursor=pointer]:
                - generic [ref=e228]: "[ 01 ]"
                - generic [ref=e229]: Сколько стоит DMX система управления?
                - generic [ref=e230]: −
            - region [ref=e231]:
              - paragraph [ref=e233]: Стоимость DMX-системы складывается из топологии шкафов, контроллеров, количества вселенных, синхронизации плоскостей и сложности сценариев. Для премиальных объектов она формируется индивидуально и обычно начинается от 4 000 USD за объединение нескольких фасадов в единый сценарий. Сценарии под ключ считаются отдельно — простая сцена от 600 USD, сложная — до 3 000 USD за сцену.
          - listitem [ref=e235]:
            - heading "[ 02 ] Сколько стоит фасадная анимация?" [level=3] [ref=e236]:
              - button "[ 02 ] Сколько стоит фасадная анимация?" [ref=e237] [cursor=pointer]:
                - generic [ref=e238]: "[ 02 ]"
                - generic [ref=e239]: Сколько стоит фасадная анимация?
                - generic [ref=e240]: +
            - paragraph [ref=e242]: "Фасадная анимация считается по сценам. Простая сцена — 600 USD, средняя — 1 000 USD, сложная — 3 000 USD. На пиксельных и ламельных фасадах сцены дешевле: 200 / 600 / 1 600 USD. Объединение нескольких фасадов в единый сценарий — отдельная позиция, от 4 000 USD."
          - listitem [ref=e244]:
            - heading "[ 03 ] Сколько стоит 1 пиксель медиафасада?" [level=3] [ref=e245]:
              - button "[ 03 ] Сколько стоит 1 пиксель медиафасада?" [ref=e246] [cursor=pointer]:
                - generic [ref=e247]: "[ 03 ]"
                - generic [ref=e248]: Сколько стоит 1 пиксель медиафасада?
                - generic [ref=e249]: +
            - paragraph [ref=e251]: Стоимость одного пикселя зависит от шага сетки, типа крепления, защиты от внешней среды и контроллера. Цена варьируется от нескольких долларов за пиксель в плотных уличных матрицах до десятков долларов в крупном уличном пикселе с независимой адресацией. Точную цифру мы даём после изучения геометрии фасада.
          - listitem [ref=e253]:
            - heading "[ 04 ] Сколько стоит 1 точка пиксельного фасада?" [level=3] [ref=e254]:
              - button "[ 04 ] Сколько стоит 1 точка пиксельного фасада?" [ref=e255] [cursor=pointer]:
                - generic [ref=e256]: "[ 04 ]"
                - generic [ref=e257]: Сколько стоит 1 точка пиксельного фасада?
                - generic [ref=e258]: +
            - paragraph [ref=e260]: Точка ламельного и пиксельного фасада обычно стоит дешевле классического медиапикселя за счёт большего шага и упрощённой адресации. Реальная цена считается под задачу, мы выдаём её в коммерческом предложении вместе со схемой раскладки.
          - listitem [ref=e262]:
            - heading "[ 05 ] Сколько стоит 1 метр гибкого неона?" [level=3] [ref=e263]:
              - button "[ 05 ] Сколько стоит 1 метр гибкого неона?" [ref=e264] [cursor=pointer]:
                - generic [ref=e265]: "[ 05 ]"
                - generic [ref=e266]: Сколько стоит 1 метр гибкого неона?
                - generic [ref=e267]: +
            - paragraph [ref=e269]: "Стоимость метра неона зависит от типа: моно RGB, RGBW, IP-класса, толщины и крепежа. Базовый монохромный неон стоит существенно дешевле, чем полноцветный с пиксельным управлением. Финальная цена — после раскладки контура."
          - listitem [ref=e271]:
            - heading "[ 06 ] Чем отличается простая, средняя и сложная анимация?" [level=3] [ref=e272]:
              - button "[ 06 ] Чем отличается простая, средняя и сложная анимация?" [ref=e273] [cursor=pointer]:
                - generic [ref=e274]: "[ 06 ]"
                - generic [ref=e275]: Чем отличается простая, средняя и сложная анимация?
                - generic [ref=e276]: +
            - paragraph [ref=e278]: Простая сцена — базовая волна, спокойный архитектурный акцент, минимальная ручная доработка. Средняя — зонирование, диммирование частей, несколько фаз, работа с геометрией. Сложная — индивидуальная логика, ручная работа по большому количеству элементов, длительная настройка, до двух недель на сцену.
          - listitem [ref=e280]:
            - heading "[ 07 ] Почему сложная анимация стоит дороже?" [level=3] [ref=e281]:
              - button "[ 07 ] Почему сложная анимация стоит дороже?" [ref=e282] [cursor=pointer]:
                - generic [ref=e283]: "[ 07 ]"
                - generic [ref=e284]: Почему сложная анимация стоит дороже?
                - generic [ref=e285]: +
            - paragraph [ref=e287]: "Сложная сцена пишется вручную для конкретного фасада: ритм геометрии, индивидуальные группы, многослойные переходы, ночные тесты и точная калибровка. На один такой сценарий уходит до двух недель работы инженера и художника по свету."
          - listitem [ref=e289]:
            - heading "[ 08 ] Что входит в стоимость?" [level=3] [ref=e290]:
              - button "[ 08 ] Что входит в стоимость?" [ref=e291] [cursor=pointer]:
                - generic [ref=e292]: "[ 08 ]"
                - generic [ref=e293]: Что входит в стоимость?
                - generic [ref=e294]: +
            - paragraph [ref=e296]: В стоимость сцены входит написание сценария, настройка на оборудовании заказчика или нашей лабе, синхронизация фаз, ночное тестирование на объекте, документация по сцене и передача исходников. Оборудование и монтаж считаются отдельно.
          - listitem [ref=e298]:
            - heading "[ 09 ] Почему объединение фасадов считается отдельно?" [level=3] [ref=e299]:
              - button "[ 09 ] Почему объединение фасадов считается отдельно?" [ref=e300] [cursor=pointer]:
                - generic [ref=e301]: "[ 09 ]"
                - generic [ref=e302]: Почему объединение фасадов считается отдельно?
                - generic [ref=e303]: +
            - paragraph [ref=e305]: "Когда здание имеет 2+ фасада, появляется единая драматургия: переходы между плоскостями, согласование общей логики, тестирование сценариев на разных углах и удалённый монтажный надзор. Это отдельная инженерная работа, не сводимая к сумме сцен."
          - listitem [ref=e307]:
            - heading "[ 10 ] Сколько стоит обслуживание архитектурного освещения?" [level=3] [ref=e308]:
              - button "[ 10 ] Сколько стоит обслуживание архитектурного освещения?" [ref=e309] [cursor=pointer]:
                - generic [ref=e310]: "[ 10 ]"
                - generic [ref=e311]: Сколько стоит обслуживание архитектурного освещения?
                - generic [ref=e312]: +
            - paragraph [ref=e314]: "Стоимость сервиса формируется как годовой контракт: количество регламентных выездов, время реакции по SLA, удалённый мониторинг и склад запасных модулей. Для отелей и landmark-фасадов мы предлагаем расширенный SLA с реакцией от 4 часов."
